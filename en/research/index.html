    <script type="text/html">
    <div class="card reveal">
      <div class="card-header">
        <span class="icon">🔬</span>
        <h2>Overview</h2>
      </div>
      <p style="font-size:0.95rem; line-height:1.85;">
        My field of expertise is <strong>cognitive science</strong>. I focus on understanding higher-order cognitive functions through neuroscientifically plausible computational models, with "others" as the central theme. Others are inherently opaque — their true inner states cannot be directly known. Humans exchange information to cooperate and build society together. I aim to uncover the computational principles underlying this social interaction.
      </p>
    </div>

    <div class="card reveal">
      <div class="card-header">
        <span class="icon">🧩</span>
        <h2>Research Themes</h2>
      </div>
      <div class="research-grid">

        <div class="research-item">
          <h3>Cognitive Science of "Others"</h3>
          <p>
            The ability to infer others' mental states — intentions, emotions, beliefs — is called <em>Theory of Mind</em>. I use computational models to investigate how this capacity overcomes the brain's computational constraints and temporal demands of real-time communication to enable smooth social interaction.
          </p>
        </div>

        <div class="research-item">
          <h3>Computational Model of Animacy Perception</h3>
          <p>
            Animacy perception — the sense of "life-likeness" evoked by moving dots — is formalized through Bayesian inference-based mathematical models and tested experimentally. I focus especially on goal-direction inference and how species-related instructions modulate perception.
          </p>
          <div class="pub-ref">
            📄 <a href="https://www.jcss.gr.jp/meetings/jcss2025/proceedings/pdf/JCSS2025_P1-45.pdf" target="_blank">JCSS 2025</a> &nbsp;/&nbsp;
            <a href="https://hai-conference.net/symp2025/proceedings/html/paper/paper-G-6.html" target="_blank">HAI 2025</a> &nbsp;/&nbsp; CogSci 2025
          </div>
        </div>

        <div class="research-item">
          <h3>Creativity and Online Communities</h3>
          <p>
            Using large-scale data from online creative communities, I analyzed how the quality and diversity of others' works that creators reference affects the quality of their own outputs. This work was published in <em>Scientific Reports</em>.
          </p>
          <div class="pub-ref">
            📄 <a href="https://doi.org/10.1038/s41598-024-65124-y" target="_blank">Sato, Yang &amp; Ueda, <em>Scientific Reports</em> (2024)</a>
          </div>
        </div>

        <div class="research-item">
          <h3>Social Interaction and Sense of Joint Agency</h3>
          <p>
            In collaborative tasks, I examine how a partner's behavioral process and prior information affect the Sense of Joint Agency. The goal is to clarify the computational mechanisms underlying mutual understanding in cooperative settings.
          </p>
          <div class="pub-ref">📄 Multiple co-authored papers, CogSci 2025 / JPS 2025</div>
        </div>

        <div class="research-item">
          <h3>World Models and Language</h3>
          <p>
            The brain is said to learn an internal model of the world's structure from sensory input. I am interested in the "distortion" that arises at the intersection of the world model built for the self and language built for sharing with others — two fundamentally different systems.
          </p>
        </div>

      </div>
    </div>
